<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>애니콜택시 - 예상요금 확인하기</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans KR',sans-serif;background:linear-gradient(160deg,#091729 0%,#0f2540 60%,#132e4e 100%);min-height:100vh;display:flex;justify-content:center;}
.wrap{width:100%;max-width:440px;padding-bottom:40px}
.hdr{background:linear-gradient(90deg,#c8880a,#f5b800);padding:12px 16px;display:flex;align-items:center;gap:10px}
.hdr-icon{font-size:24px}
.hdr-sub{font-size:8px;font-weight:700;color:rgba(0,0,0,0.4);letter-spacing:.15em}
.hdr-title{font-size:17px;font-weight:900;color:#0b1e3d}
.body{padding:13px 13px 0}
.tabs{display:flex;background:rgba(255,255,255,0.06);border-radius:9px;padding:3px;margin-bottom:12px;border:1px solid rgba(255,255,255,0.08)}
.tab{flex:1;padding:9px 4px;border:none;border-radius:6px;cursor:pointer;font-family:inherit;font-size:11px;font-weight:700;transition:all .18s;color:rgba(255,255,255,0.38);background:transparent}
.tab.on{background:linear-gradient(135deg,#c8880a,#f5b800);color:#0b1e3d}
.field{margin-bottom:9px;position:relative}
.lbl{display:block;font-size:10px;font-weight:700;color:rgba(255,255,255,0.4);letter-spacing:.08em;margin-bottom:4px}
.inp,.sel{width:100%;padding:10px 12px;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.12);border-radius:9px;color:white;font-size:13px;font-family:inherit;outline:none;appearance:none;-webkit-appearance:none;transition:border-color .2s}
.inp:focus,.sel:focus{border-color:rgba(245,184,0,0.5);background:rgba(255,255,255,0.1)}
.inp::placeholder{color:rgba(255,255,255,0.28)}
.sel option{background:#1a3354;color:white}
.row2{display:flex;gap:8px}
.row2 .field{flex:1}
.row2 .field.w2{flex:2}
.row3{display:flex;gap:6px}
.row3 .field{flex:1}

/* 자동완성 드롭다운 */
.autocomplete{position:absolute;top:100%;left:0;right:0;z-index:100;background:#1a3354;border:1px solid rgba(245,184,0,0.3);border-radius:8px;margin-top:2px;max-height:200px;overflow-y:auto;display:none}
.autocomplete.show{display:block}
.ac-item{padding:10px 12px;font-size:12px;color:rgba(255,255,255,0.85);cursor:pointer;border-bottom:1px solid rgba(255,255,255,0.05);line-height:1.4}
.ac-item:hover{background:rgba(245,184,0,0.15)}
.ac-item .ac-main{font-weight:600}
.ac-item .ac-sub{font-size:11px;color:rgba(255,255,255,0.45);margin-top:1px}
.searching{padding:10px 12px;font-size:12px;color:rgba(255,255,255,0.4);text-align:center}

.divider{height:1px;background:rgba(255,255,255,0.07);margin:11px 0}
.sec-title{font-size:10px;font-weight:700;color:rgba(255,200,0,0.55);letter-spacing:.1em;margin-bottom:9px}

.calc-btn{width:100%;margin-top:12px;padding:14px;background:linear-gradient(135deg,#c8880a,#f5b800);border:none;border-radius:10px;font-size:14px;font-weight:700;color:#0b1e3d;cursor:pointer;font-family:inherit;transition:all .15s;letter-spacing:.02em}
.calc-btn:hover{filter:brightness(1.08);transform:translateY(-1px)}
.calc-btn:disabled{background:rgba(245,184,0,0.2);color:rgba(255,255,255,0.2);cursor:not-allowed;transform:none}

/* 결과 */
.result-box{margin-top:12px;border-radius:12px;border:1px solid rgba(245,184,0,0.3);background:rgba(255,255,255,0.04);overflow:hidden;animation:sli .25s ease}
@keyframes sli{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.ri{padding:14px}
.el{font-size:9px;font-weight:700;color:#f5b800;letter-spacing:.13em;margin-bottom:4px}
.ep{display:flex;align-items:center;gap:10px;margin-bottom:4px}
.ep .pr{font-size:30px;font-weight:900;color:white;letter-spacing:-.02em}
.nb{background:#ff6b35;border-radius:4px;padding:2px 7px;font-size:9px;color:white;font-weight:700}
.em{color:rgba(255,255,255,0.42);font-size:11px;margin-bottom:10px}
.bd{border-top:1px solid rgba(255,255,255,0.08);padding-top:9px;display:flex;flex-direction:column;gap:5px}
.br{display:flex;justify-content:space-between;font-size:12px}
.br .k{color:rgba(255,255,255,0.42)}
.br .v{color:rgba(255,255,255,0.82)}
.br.total-row{margin-top:4px;padding-top:6px;border-top:1px dashed rgba(245,184,0,0.2)}
.br.total-row .k{color:rgba(255,255,255,0.65);font-weight:700}
.br.total-row .v{color:#f5b800;font-weight:700}
.nt{margin-top:9px;font-size:10px;color:rgba(255,255,255,0.26);line-height:1.7}
.btn-row{display:flex;gap:8px;margin-top:11px}
.kbtn{flex:1;padding:11px 8px;border:none;border-radius:9px;font-size:12px;font-weight:700;color:#0b1e3d;cursor:pointer;font-family:inherit;transition:all .15s;background:linear-gradient(135deg,#c8880a,#f5b800)}
.kbtn:hover{filter:brightness(1.08)}
.kbtn.outline{background:transparent;border:1px solid rgba(245,184,0,0.4);color:rgba(255,255,255,0.7)}
.kbtn.outline:hover{background:rgba(245,184,0,0.1)}

/* 지도 */
.map-wrap{margin-top:11px;border-radius:12px;overflow:hidden;border:1px solid rgba(245,184,0,0.18);animation:sli .3s ease}
.map-hdr{background:rgba(245,184,0,0.08);padding:8px 13px;display:flex;align-items:center;gap:6px;border-bottom:1px solid rgba(245,184,0,0.1)}
.map-hdr-txt{font-size:11px;font-weight:700;color:rgba(255,255,255,0.65)}
.map-hdr-dist{margin-left:auto;font-size:11px;font-weight:700;color:#f5b800}
#map{height:240px;width:100%}
.map-load{height:240px;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:8px;color:rgba(255,255,255,0.38);font-size:12px}
.spinner{width:24px;height:24px;border:2px solid rgba(245,184,0,0.2);border-top-color:#f5b800;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* 에러 */
.err-msg{margin-top:8px;padding:10px 12px;background:rgba(255,80,80,0.1);border:1px solid rgba(255,80,80,0.25);border-radius:8px;font-size:12px;color:#ff9999;display:none}
.err-msg.show{display:block}

@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}
.shake{animation:shake .4s ease}
</style>
</head>
<body>
<div class="wrap">
  <div class="hdr">
    <div class="hdr-icon">✈️</div>
    <div>
      <div class="hdr-sub">ANICALL TAXI · 애니콜택시</div>
      <div class="hdr-title">예상요금 확인하기</div>
    </div>
  </div>

  <div class="body">
    <div class="tabs">
      <button class="tab on" id="tab-out" onclick="switchTab('출국')">🛫 출국 (출발지→공항)</button>
      <button class="tab" id="tab-in" onclick="switchTab('입국')">🛬 입국 (공항→목적지)</button>
    </div>

    <!-- 출발지 주소 -->
    <div class="field" id="field-addr">
      <label class="lbl" id="lbl-addr">출발지 주소</label>
      <input class="inp" id="inp-addr" placeholder="예: 서울 강남구 테헤란로 152" autocomplete="off" oninput="onAddrInput()" onblur="hideAc()">
      <div class="autocomplete" id="ac-list"></div>
    </div>

    <!-- 공항 선택 -->
    <div class="field">
      <label class="lbl" id="lbl-ap">도착 공항</label>
      <select class="sel" id="sel-airport" onchange="clearResult()">
        <option value="T1">인천공항 T1</option>
        <option value="T2">인천공항 T2</option>
      </select>
    </div>

    <!-- 날짜 + 인원 -->
    <div class="row2">
      <div class="field w2">
        <label class="lbl">탑승 일시</label>
        <input class="inp" type="datetime-local" id="inp-date" style="font-size:12px" onchange="clearResult()">
      </div>
      <div class="field">
        <label class="lbl">인원</label>
        <input class="inp" type="number" id="inp-pax" min="1" max="9" value="1" onchange="clearResult()">
      </div>
    </div>

    <!-- 차량 -->
    <div class="field">
      <label class="lbl">차량 종류</label>
      <select class="sel" id="sel-veh" onchange="clearResult()">
        <option value="medium">중형택시 (4인승)</option>
        <option value="large">대형택시 (6인승)</option>
        <option value="van">콜밴 (9인승)</option>
      </select>
    </div>



    <div class="err-msg" id="err-msg">주소를 찾을 수 없어요. 더 자세히 입력해 주세요.</div>

    <button class="calc-btn" onclick="calculate()" id="btn-calc">🔍 예상 요금 계산하기</button>

    <div id="result-wrap"></div>
    <div id="map-container"></div>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
// ── 공항 좌표 ─────────────────────────────────────────
const AIRPORTS = {
  T1: {name:'인천공항 T1', lat:37.44936, lng:126.45100},
  T2: {name:'인천공항 T2', lat:37.47281, lng:126.44861},
};

// ── 미터기 요금 공식 ────────────────────────────────────
// 서울 중형택시 (2023년 기준)
// 기본: 4,800원 / 1.6km
// 추가: 100원 / 132m → 757.58원/km
// 야간(22-04): 20% 할증 (기본+주행요금 모두)
//
// 대형택시
// 기본: 6,500원 / 2.0km
// 추가: 100원 / 127m → 787원/km
// 야간: 20%
//
// 콜밴 (고정요금 아님 - 협의, 여기선 대형 기준 +30% 가산)

const METER = {
  medium: {base:4800, baseKm:1.6, perKm:757.58, nightMult:1.2},
  large:  {base:6500, baseKm:2.0, perKm:787.40, nightMult:1.2},
  van:    {base:8000, baseKm:2.0, perKm:900.00, nightMult:1.2},
};

// ── 통행료 계산 ─────────────────────────────────────────
// 인천공항 주요 통행료:
// - 인천공항고속도로 본선: 7,900원 (서울 방면 → T1 기준)
// - 인천대교 경유 시: 인천대교 6,600원 + 인천공항고속도로 일부
// - T2는 T1 요금 + 내부연결도로 900원 추가
// 경로별로 OSRM 결과에서 판단

function estimateToll(routeCoords, airportId) {
  // 인천국제공항고속도로 실제 통행료 (2024년 현금 기준)
  // 진입 IC에 따라 구간 요금이 다름 (티맵/실측 데이터 기반)

  let toll = 0;
  const startLat = routeCoords[0][0];
  const startLng = routeCoords[0][1];

  // 인천대교 경유 여부 (경기 남부 → 영종도 직행)
  const passesIncheonBridge = routeCoords.some(c =>
    c[0] > 37.30 && c[0] < 37.42 && c[1] > 126.52 && c[1] < 126.65
  );

  if (passesIncheonBridge) {
    // 인천대교(4,400) + 공항진입로(2,200) = 6,600
    toll = 6600;
  } else {
    // 인천국제공항고속도로 진입 IC별 실제 통행료
    //
    // 가양IC 진입권 (마포/강서/강남/영등포/양천/구로/고양 등):
    //   가양IC → 공항입구JC: 3,200원
    //
    // 서울TG 진입권 (서울 동부/북부, 경기 동부/남부):
    //   서울TG → 공항입구JC: 6,600원
    //
    // 가양IC 사용 지역: 경도 126.75~127.00, 위도 37.45~37.65 (서울 서/남/북서, 경기 서부)
    // 서울TG 사용 지역: 그 외 서울 동부/강남/노원, 경기 동/남부

    const usesGayangIC = (
      // 마포, 강서, 양천, 구로, 영등포, 금천, 관악, 동작
      (startLat > 37.44 && startLat < 37.60 && startLng > 126.82 && startLng < 127.00) ||
      // 고양, 파주, 김포 (경기 서부)
      (startLat > 37.55 && startLng < 126.92) ||
      // 부천, 광명, 시흥 (경기 서남부)
      (startLat > 37.34 && startLat < 37.53 && startLng > 126.72 && startLng < 126.88)
    );

    if (usesGayangIC) {
      toll = 3200; // 가양IC → 공항입구JC
    } else if (startLat < 37.38) {
      // 수원, 용인, 안양, 안산 등 경기 남부 → 수원신갈JC or 시흥 경유
      toll = 5500;
    } else if (startLat > 37.63) {
      // 의정부, 양주 등 경기 북부
      toll = 5500;
    } else {
      // 서울 강남/송파/강동/강북/노원, 경기 성남/남양주 등
      toll = 6600; // 서울TG → 공항입구JC
    }
  }

  // T2 추가 (내부연결도로 통행료)
  if (airportId === 'T2') toll += 900;

  return toll;
}

// ── 요금 계산 함수 ──────────────────────────────────────
function calcFare(distKm, vehType, nightMult, toll) {
  const m = METER[vehType];
  let fare = m.base;
  const extraKm = Math.max(0, distKm - m.baseKm);
  fare += Math.round(extraKm * m.perKm / 100) * 100;
  if (nightMult > 1.0) fare = Math.round(fare * nightMult / 100) * 100;
  fare = Math.max(fare, m.base);
  return fare + toll;
}

// ── 상태 ────────────────────────────────────────────────
let currentTab = '출국';
let selectedAddr = null; // {display, lat, lng}
let leafMap = null;
let acTimer = null;

// ── 날짜 초기화 ─────────────────────────────────────────
(()=>{
  const n = new Date();
  n.setMinutes(n.getMinutes()-n.getTimezoneOffset());
  document.getElementById('inp-date').value = n.toISOString().slice(0,16);
})();

// ── 탭 전환 ─────────────────────────────────────────────
function switchTab(t) {
  currentTab = t;
  document.getElementById('tab-out').className = 'tab'+(t==='출국'?' on':'');
  document.getElementById('tab-in').className  = 'tab'+(t==='입국'?' on':'');
  document.getElementById('lbl-addr').textContent = t==='출국' ? '출발지 주소' : '도착지 주소';
  document.getElementById('lbl-ap').textContent   = t==='출국' ? '도착 공항' : '출발 공항';
  clearResult();
}

// ── 카카오 로컬 API 주소 검색 ──────────────────────────────
const KAKAO_KEY = '919c3312f6ce069ca2076328c40b4a56';

function onAddrInput() {
  selectedAddr = null;
  clearResult();
  const q = document.getElementById('inp-addr').value.trim();
  if (q.length < 2) { hideAcList(); return; }
  clearTimeout(acTimer);
  acTimer = setTimeout(() => searchAddr(q), 350);
}

async function geocodeKR(q) {
  try {
    const url = `https://dapi.kakao.com/v2/local/search/address.json?query=${encodeURIComponent(q)}&size=5`;
    const res = await fetch(url, {headers: {'Authorization': `KakaoAK ${KAKAO_KEY}`}});
    const data = await res.json();
    if (data.documents && data.documents.length) {
      return data.documents.map(d => ({display: d.address_name, lat: parseFloat(d.y), lng: parseFloat(d.x)}));
    }
  } catch(e) {}
  try {
    const url2 = `https://dapi.kakao.com/v2/local/search/keyword.json?query=${encodeURIComponent(q)}&size=5`;
    const res2 = await fetch(url2, {headers: {'Authorization': `KakaoAK ${KAKAO_KEY}`}});
    const data2 = await res2.json();
    if (data2.documents && data2.documents.length) {
      return data2.documents.map(d => ({display: d.address_name || d.place_name, lat: parseFloat(d.y), lng: parseFloat(d.x)}));
    }
  } catch(e) {}
  return [];
}

async function searchAddr(q) {
  const acList = document.getElementById('ac-list');
  acList.innerHTML = '<div class="searching">🔍 검색 중...</div>';
  acList.classList.add('show');
  const results = await geocodeKR(q);
  if (!results.length) {
    acList.innerHTML = '<div class="searching">주소를 찾을 수 없어요</div>';
    return;
  }
  acList.innerHTML = '';
  results.forEach(item => {
    const div = document.createElement('div');
    div.className = 'ac-item';
    div.innerHTML = `<div class="ac-main">${item.display}</div>`;
    div.addEventListener('mousedown', (e) => { e.preventDefault(); selectAddr(item); });
    acList.appendChild(div);
  });
}

function selectAddr(addr) {
  selectedAddr = addr;
  document.getElementById('inp-addr').value = addr.display;
  hideAcList();
}

function hideAcList() {
  document.getElementById('ac-list').classList.remove('show');
}

function hideAc() {
  setTimeout(hideAcList, 150);
}

function clearResult() {
  document.getElementById('result-wrap').innerHTML = '';
  document.getElementById('map-container').innerHTML = '';
  document.getElementById('err-msg').classList.remove('show');
  if(leafMap){leafMap.remove();leafMap=null;}
}

// ── 메인 계산 ────────────────────────────────────────────
async function calculate() {
  const btn = document.getElementById('btn-calc');
  const errMsg = document.getElementById('err-msg');
  errMsg.classList.remove('show');
  clearResult();

  // 주소 미선택 시 검색 시도
  if (!selectedAddr) {
    const q = document.getElementById('inp-addr').value.trim();
    if (!q) {
      document.getElementById('inp-addr').classList.add('shake');
      setTimeout(()=>document.getElementById('inp-addr').classList.remove('shake'),500);
      return;
    }
    // 직접 지오코딩
    btn.disabled = true;
    btn.textContent = '🔍 주소 검색 중...';
    const geoData = await geocodeKR(q);
    if (!geoData.length) {
      errMsg.textContent = '주소를 찾을 수 없어요. 더 자세히 입력해 주세요.';
      errMsg.classList.add('show');
      btn.disabled=false; btn.textContent='🔍 예상 요금 계산하기';
      return;
    }
    selectedAddr = {display: geoData[0].display, lat: geoData[0].lat, lng: geoData[0].lng};
  }

  btn.disabled = true;
  btn.textContent = '📡 경로 계산 중...';

  const apId  = document.getElementById('sel-airport').value;
  const ap    = AIRPORTS[apId];
  const veh   = document.getElementById('sel-veh').value;
  const dateV = document.getElementById('inp-date').value;
  const hr    = dateV ? new Date(dateV).getHours() : new Date().getHours();
  // 야간할증 구간별 차등 적용
  // 22:00~23:00 → 20%, 23:00~02:00 → 40%, 02:00~04:00 → 20%
  const isNight = hr>=22||hr<4;
  const nightMult = (hr>=23||hr<2) ? 1.4 : (hr>=22||hr<4) ? 1.2 : 1.0;

  // 출국: dep=selectedAddr, arr=airport
  // 입국: dep=airport, arr=selectedAddr
  const dep = currentTab==='출국'
    ? {lat:selectedAddr.lat, lng:selectedAddr.lng}
    : {lat:ap.lat, lng:ap.lng};
  const arr = currentTab==='출국'
    ? {lat:ap.lat, lng:ap.lng}
    : {lat:selectedAddr.lat, lng:selectedAddr.lng};
  const depName = currentTab==='출국' ? selectedAddr.display : ap.name;
  const arrName = currentTab==='출국' ? ap.name : selectedAddr.display;

  try {
    // T-map API 시도 → 실패 시 OSRM 자동 전환
    const TMAP_KEY = 'EPMc1DKBPk7bejPe51Vlm8t9PeCjuAmO78LMKmIl';
    let distKm, durMin, toll, coords, usedTmap = false;

    try {
      const tmapUrl = `https://apis.openapi.sk.com/tmap/routes?version=1&format=json&appKey=${TMAP_KEY}`;
      const tmapRes = await fetch(tmapUrl, {
        method: 'POST',
        headers: {'Content-Type': 'application/json', 'appKey': TMAP_KEY},
        body: JSON.stringify({
          startX: String(dep.lng), startY: String(dep.lat),
          endX: String(arr.lng),   endY: String(arr.lat),
          reqCoordType: 'WGS84GEO', resCoordType: 'WGS84GEO',
          startName: '출발지', endName: '도착지',
          trafficInfo: 'Y', tollgateFareOption: 16,
        })
      });
      const tmapData = await tmapRes.json();
      if (tmapData.features && tmapData.features.length) {
        const summary = tmapData.features[0].properties;
        distKm = summary.totalDistance / 1000;
        durMin = Math.round(summary.totalTime / 60);
        toll   = (summary.totalFare && summary.totalFare > 0)
                   ? summary.totalFare : estimateToll([], apId);
        coords = tmapData.features
          .filter(f => f.geometry && f.geometry.type === 'LineString')
          .flatMap(f => f.geometry.coordinates.map(c => [c[1], c[0]]));
        usedTmap = true;
      }
    } catch(e) { /* T-map 실패 → OSRM으로 fallback */ }

    if (!usedTmap) {
      // OSRM fallback
      const osrmUrl = `https://router.project-osrm.org/route/v1/driving/${dep.lng},${dep.lat};${arr.lng},${arr.lat}?overview=full&geometries=geojson`;
      const osrmRes = await fetch(osrmUrl);
      const osrmData = await osrmRes.json();
      if (!osrmData.routes || !osrmData.routes.length) throw new Error('경로 없음');
      const route = osrmData.routes[0];
      distKm = route.distance / 1000;
      durMin = Math.round(route.duration / 60);
      coords = route.geometry.coordinates.map(c => [c[1], c[0]]);
      toll   = estimateToll(coords, apId);
    }

    // 서울 미터기 공식으로 요금 계산
    const meterFare = calcFare(distKm, veh, nightMult, 0);
    const totalFare = meterFare + toll;

    const m = METER[veh];
    const baseFare = m.base;
    const extraKm = Math.max(0, distKm - m.baseKm);
    let distFare = Math.round(extraKm * m.perKm / 100) * 100;
    let nightAdd = 0;
    if (nightMult > 1.0) {
      const beforeNight = baseFare + distFare;
      const afterNight  = Math.round(beforeNight * nightMult / 100) * 100;
      nightAdd = afterNight - beforeNight;
    }

    showResult({depName, arrName, distKm, durMin, baseFare, distFare, nightAdd, toll, totalFare, isNight, nightMult, veh, apId});
    showMap(coords, dep, arr, depName, arrName, distKm);

  } catch(e) {
    errMsg.textContent = '경로를 계산할 수 없어요. 주소를 확인해주세요.';
    errMsg.classList.add('show');
  }

  btn.disabled=false;
  btn.textContent='🔍 예상 요금 계산하기';
}

// ── 결과 표시 ────────────────────────────────────────────
function showResult({depName,arrName,distKm,durMin,baseFare,distFare,nightAdd,toll,totalFare,isNight,veh,apId}) {
  const vehNames={medium:'중형택시',large:'대형택시',van:'콜밴'};
  const f=getFormData(depName,arrName,totalFare,veh,apId);

  document.getElementById('result-wrap').innerHTML = `
    <div class="result-box">
      <div class="ri">
        <div class="el">ESTIMATE · ${depName}</div>
        <div class="ep">
          <span class="pr">${totalFare.toLocaleString()}원</span>
          ${nightMult===1.4?'<span class="nb">심야할증 40%</span>':nightMult===1.2?'<span class="nb">야간할증 20%</span>':''}
        </div>
        <div class="em">실제 도로 ${distKm.toFixed(1)}km · 예상 ${durMin}분 · ${vehNames[veh]}</div>
        <div class="bd">
          <div class="br"><span class="k">기본요금</span><span class="v">${baseFare.toLocaleString()}원</span></div>
          <div class="br"><span class="k">거리요금 (${distKm.toFixed(1)}km)</span><span class="v">${distFare.toLocaleString()}원</span></div>
          ${nightMult>1.0?`<div class="br"><span class="k">야간할증 (+${Math.round((nightMult-1)*100)}%)</span><span class="v">+${nightAdd.toLocaleString()}원</span></div>`:''}
          <div class="br"><span class="k">통행료 (실제 경로)</span><span class="v">+${toll.toLocaleString()}원</span></div>
          <div class="br total-row"><span class="k">합계</span><span class="v">${totalFare.toLocaleString()}원</span></div>
        </div>
        <div class="nt">※ 실제 요금은 미터기+통행료로 정산됩니다. 교통상황에 따라 ±10~15% 차이가 날 수 있습니다.<br>야간할증: 22~23시·02~04시 +20% / 23~02시 +40%</div>
        <div class="btn-row">
          <button class="kbtn outline" onclick="openKakaoChat('${escJs(f.card)}')">💬 채팅 문의</button>
          <button class="kbtn" onclick="openKakaoChat('${escJs(f.card)}')">📋 예약하기 →</button>
        </div>
      </div>
    </div>`;
}

function escJs(str){ return str.replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/\n/g,'\\n'); }

function getFormData(depName,arrName,totalFare,veh,apId){
  const dateV = document.getElementById('inp-date').value;
  const d = dateV ? new Date(dateV) : new Date();
  const ymd = `${d.getFullYear()}년 ${d.getMonth()+1}월 ${d.getDate()}일`;
  const hh=d.getHours(), mm=String(d.getMinutes()).padStart(2,'0');
  const ampm=hh<12?'오전':'오후';
  const hhmm=`${ampm} ${hh<=12?hh:hh-12}시 ${mm}분`;
  const pax=document.getElementById('inp-pax').value;
  const carry=document.getElementById('inp-carry').value;
  const cargo=document.getElementById('inp-cargo').value;
  const golf=document.getElementById('inp-golf').value;
  const phone=document.getElementById('inp-phone').value||'(미입력)';
  const name=document.getElementById('inp-name').value||'(미입력)';
  const memo=document.getElementById('inp-memo').value||'없음';
  const vehNames={medium:'중형택시',large:'대형택시',van:'콜밴'};
  const icon=currentTab==='출국'?'🚖':'🛬';
  const kind=currentTab==='출국'?'출국':'입국';
  const card=`${icon}${kind}택시 견적 & 예약
1️⃣출발일자 : ${ymd}
2️⃣탑승시간 : ${hhmm}
3️⃣출발지 : ${depName}
4️⃣목적지 : ${arrName}
5️⃣탑승인원 : ${pax}명
6️⃣기내용 캐리어 : ${carry}개
7️⃣화물용 캐리어 : ${cargo}개
8️⃣골프백/기타 : ${golf}개
9️⃣연락처 : ${phone}
🔟이름 : ${name}
🚗차량 : ${vehNames[veh]}
💰예상요금 : 약 ${totalFare.toLocaleString()}원
♥️요청사항 : ${memo}`;
  return {card};
}

function openKakaoChat(card) {
  if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(card).catch(()=>fallbackCopy(card));
  } else { fallbackCopy(card); }
  setTimeout(()=>window.open('https://pf.kakao.com/_gVxaAX/chat','_blank'),200);
}

function fallbackCopy(text){
  const ta=document.createElement('textarea');
  ta.value=text;ta.style.position='fixed';ta.style.opacity='0';
  document.body.appendChild(ta);ta.focus();ta.select();
  try{document.execCommand('copy');}catch(e){}
  document.body.removeChild(ta);
}

// ── 지도 ─────────────────────────────────────────────────
function showMap(coords,dep,arr,depName,arrName,distKm){
  if(leafMap){leafMap.remove();leafMap=null;}
  document.getElementById('map-container').innerHTML=`
    <div class="map-wrap">
      <div class="map-hdr">
        <span>🗺️</span>
        <span class="map-hdr-txt">${depName.split(' ').slice(0,2).join(' ')} → ${arrName}</span>
        <span class="map-hdr-dist">${distKm.toFixed(1)}km</span>
      </div>
      <div id="map-load" class="map-load"><div class="spinner"></div><span>지도 불러오는 중...</span></div>
      <div id="map" style="display:none"></div>
    </div>`;
  setTimeout(()=>{
    document.getElementById('map-load').style.display='none';
    document.getElementById('map').style.display='block';
    leafMap=L.map('map',{zoomControl:true,attributionControl:false});
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:18}).addTo(leafMap);
    const line=L.polyline(coords,{color:'#22c55e',weight:5,opacity:.9}).addTo(leafMap);
    addMarker(dep.lat,dep.lng,'출','#3b82f6',depName);
    addMarker(arr.lat,arr.lng,'착','#ef4444',arrName);
    leafMap.fitBounds(line.getBounds(),{padding:[18,18]});
  },100);
}

function addMarker(lat,lng,label,color,name){
  const icon=L.divIcon({
    html:`<div style="background:${color};color:white;border-radius:50%;width:30px;height:30px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;border:2px solid white;box-shadow:0 2px 8px rgba(0,0,0,0.4)">${label}</div>`,
    iconSize:[30,30],iconAnchor:[15,15],className:''
  });
  L.marker([lat,lng],{icon}).bindPopup(`<b>${label==='출'?'출발':'도착'}</b><br>${name}`,{closeButton:false}).addTo(leafMap);
}
</script>
