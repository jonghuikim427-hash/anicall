<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>애니콜택시 - 예상요금 확인하기</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans KR',sans-serif;background:linear-gradient(160deg,#091729 0%,#0f2540 60%,#132e4e 100%);min-height:100vh;display:flex;justify-content:center;}
.wrap{width:100%;max-width:440px;padding-bottom:40px}
.hdr{background:linear-gradient(90deg,#c8880a,#f5b800);padding:12px 16px;display:flex;align-items:center;gap:10px}
.hdr-icon{font-size:24px}
.hdr-sub{font-size:8px;font-weight:700;color:rgba(0,0,0,0.4);letter-spacing:.15em}
.hdr-title{font-size:17px;font-weight:900;color:#0b1e3d}
.body{padding:13px 13px 0;display:flex;flex-direction:column}
.tabs{display:flex;gap:5px;margin-bottom:12px;}
.tab{flex:1;padding:9px 4px;border:1px solid rgba(255,255,255,0.15);border-radius:8px;cursor:pointer;font-family:inherit;font-size:9.5px;font-weight:700;transition:all .18s;color:rgba(255,255,255,0.5);background:rgba(255,255,255,0.05)}
.tab:hover{border-color:rgba(245,184,0,0.4);color:rgba(255,255,255,0.8)}
.tab.on{background:linear-gradient(135deg,#c8880a,#f5b800);color:#0b1e3d;border-color:transparent}
.field{margin-bottom:9px;position:relative}
.lbl{display:block;font-size:10px;font-weight:700;color:rgba(255,255,255,0.4);letter-spacing:.08em;margin-bottom:4px}
.inp,.sel{width:100%;padding:10px 12px;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.12);border-radius:9px;color:white;font-size:13px;font-family:inherit;outline:none;appearance:none;-webkit-appearance:none;transition:border-color .2s}
.inp:focus,.sel:focus{border-color:rgba(245,184,0,0.5)}
.inp::placeholder{color:rgba(255,255,255,0.28)}
.sel option{background:#1a3354;color:white}
.row2{display:flex;gap:8px}
.row2 .field{flex:1}
.row2 .field.w2{flex:2}

/* 자동완성 */
.ac{position:absolute;top:100%;left:0;right:0;z-index:200;background:#1a3354;border:1px solid rgba(245,184,0,0.3);border-radius:8px;margin-top:2px;max-height:200px;overflow-y:auto;display:none;box-shadow:0 4px 20px rgba(0,0,0,0.4)}
.ac.show{display:block}
.ac-item{padding:10px 12px;font-size:12px;color:rgba(255,255,255,0.85);cursor:pointer;border-bottom:1px solid rgba(255,255,255,0.05);line-height:1.4}
.ac-item:last-child{border-bottom:none}
.ac-item:hover{background:rgba(245,184,0,0.15)}
.ac-main{font-weight:600}
.ac-sub{font-size:11px;color:rgba(255,255,255,0.4);margin-top:2px}
.ac-msg{padding:12px;font-size:12px;color:rgba(255,255,255,0.4);text-align:center}

.calc-btn{width:100%;margin-top:12px;padding:14px;background:linear-gradient(135deg,#c8880a,#f5b800);border:none;border-radius:10px;font-size:14px;font-weight:700;color:#0b1e3d;cursor:pointer;font-family:inherit;transition:all .15s}
.calc-btn:hover{filter:brightness(1.08);transform:translateY(-1px)}

/* 결과 */
.result-box{margin-top:12px;border-radius:12px;border:1px solid rgba(245,184,0,0.3);background:rgba(255,255,255,0.04);overflow:hidden;animation:sli .25s ease}
@keyframes sli{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.ri{padding:14px}
.el{font-size:9px;font-weight:700;color:#f5b800;letter-spacing:.13em;margin-bottom:4px}
.ep{display:flex;align-items:center;gap:10px;margin-bottom:4px}
.price{font-size:30px;font-weight:900;color:white;letter-spacing:-.02em}
.nb{background:#ff6b35;border-radius:4px;padding:2px 7px;font-size:9px;color:white;font-weight:700}
.em{color:rgba(255,255,255,0.42);font-size:11px;margin-bottom:10px}
.bd{border-top:1px solid rgba(255,255,255,0.08);padding-top:9px;display:flex;flex-direction:column;gap:5px}
.br{display:flex;justify-content:space-between;font-size:12px}
.br .k{color:rgba(255,255,255,0.42)}
.br .v{color:rgba(255,255,255,0.82)}
.br.tot{margin-top:4px;padding-top:6px;border-top:1px dashed rgba(245,184,0,0.2)}
.br.tot .k{color:rgba(255,255,255,0.65);font-weight:700}
.br.tot .v{color:#f5b800;font-weight:700}
.nt{margin-top:9px;font-size:10px;color:rgba(255,255,255,0.26);line-height:1.7}
.btn-row{display:flex;gap:8px;margin-top:11px}
.kbtn{flex:1;padding:11px 8px;border:none;border-radius:9px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .15s}
.kbtn.main{background:linear-gradient(135deg,#c8880a,#f5b800);color:#0b1e3d}
.kbtn.sub{background:transparent;border:1px solid rgba(245,184,0,0.4);color:rgba(255,255,255,0.7)}
.kbtn:hover{filter:brightness(1.08)}

/* 지도 */
.map-wrap{margin-top:11px;border-radius:12px;overflow:hidden;border:1px solid rgba(245,184,0,0.18);animation:sli .3s ease}
.map-hdr{background:rgba(245,184,0,0.08);padding:8px 13px;display:flex;align-items:center;gap:6px;border-bottom:1px solid rgba(245,184,0,0.1)}
.map-hdr-txt{font-size:11px;font-weight:700;color:rgba(255,255,255,0.65)}
.map-hdr-dist{margin-left:auto;font-size:11px;font-weight:700;color:#f5b800}
#map{height:240px;width:100%}
.map-load{height:240px;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:8px;color:rgba(255,255,255,0.38);font-size:12px}
.spinner{width:24px;height:24px;border:2px solid rgba(245,184,0,0.2);border-top-color:#f5b800;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

.err-msg{margin-top:8px;padding:10px 12px;background:rgba(255,80,80,0.1);border:1px solid rgba(255,80,80,0.25);border-radius:8px;font-size:12px;color:#ff9999;display:none}
.stepper{display:flex;align-items:center;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.12);border-radius:9px;overflow:hidden;height:40px}
.stepper-btn{width:36px;height:100%;border:none;background:transparent;color:rgba(255,255,255,0.7);font-size:18px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .15s;flex-shrink:0}
.stepper-btn:hover{background:rgba(245,184,0,0.2)}
.stepper-btn:active{background:rgba(245,184,0,0.35)}
.stepper-val{flex:1;text-align:center;color:white;font-size:14px;font-weight:700;font-family:inherit}
.err-msg.show{display:block}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}
.shake{animation:shake .4s ease}
.modal-bg{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.7);z-index:999;display:flex;align-items:flex-end;justify-content:center}
.modal{background:#1a3354;border-radius:16px 16px 0 0;width:100%;max-width:440px;padding:16px 16px 32px;max-height:82vh;overflow-y:auto;position:relative}
.modal-close{position:absolute;top:12px;right:14px;width:28px;height:28px;border:none;background:rgba(255,255,255,0.1);border-radius:50%;color:rgba(255,255,255,0.7);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.extra-section{margin-bottom:14px}
.extra-label{font-size:10px;font-weight:700;color:rgba(255,255,255,0.4);letter-spacing:.08em;margin-bottom:4px;display:block}
.extra-label.req{color:#f5b800}
.extra-label.req::after{content:' *';color:#f5b800}
.extra-inp{width:100%;padding:11px 12px;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.12);border-radius:9px;color:white;font-size:13px;font-family:inherit;outline:none}
.extra-inp.req{border-color:rgba(245,184,0,0.3)}
.extra-inp:focus{border-color:rgba(245,184,0,0.5)}
.extra-inp::placeholder{color:rgba(255,255,255,0.25)}
.extra-divider{border:none;border-top:1px solid rgba(255,255,255,0.08);margin:14px 0}
.extra-opt-title{font-size:10px;font-weight:700;color:rgba(255,255,255,0.3);letter-spacing:.1em;margin-bottom:10px}
.extra-row{display:flex;gap:8px}
.extra-row .extra-section{flex:1}
.modal-title{font-size:13px;font-weight:700;color:#f5b800;margin-bottom:12px;padding-right:32px}
.modal-card{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);border-radius:10px;padding:14px;font-size:12px;color:rgba(255,255,255,0.85);line-height:1.8;white-space:pre-wrap;word-break:break-all}
.modal-btns{display:flex;gap:8px;margin-top:12px}
.modal-btn{flex:1;padding:13px;border:none;border-radius:9px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .15s}
.modal-btn.copy{background:linear-gradient(135deg,#c8880a,#f5b800);color:#0b1e3d}
.modal-btn.copy.done{background:#22c55e;border-color:#22c55e;color:white}
.modal-btn.kakao{background:linear-gradient(135deg,#c8880a,#f5b800);color:#0b1e3d;padding:22px;font-size:17px}
.modal-guide{display:none;background:rgba(255,255,255,0.04);border:1px solid rgba(245,184,0,0.3);border-radius:14px;padding:20px 16px;text-align:center;line-height:1.8}
.modal-guide.show{display:block}
.modal-guide-icon{font-size:28px;margin-bottom:6px}
.modal-guide-title{font-size:11px;font-weight:500;color:rgba(255,255,255,0.4);margin-top:12px}
.modal-guide-sub{font-size:20px;font-weight:900;color:#f5b800;line-height:1.7}
</style>

<body>
<div class="wrap">
  <div class="hdr">
    <div class="hdr-icon">✈️</div>
    <div>
      <div class="hdr-sub">ANICALL TAXI · 애니콜택시</div>
      <div class="hdr-title">예상요금 확인하기</div>
    </div>
  </div>

  <div class="body">
    <div class="tabs" style="order:0">
      <button class="tab on" id="tab-out" onclick="switchTab('출국')" style="font-size:9.5px;padding:8px 2px">🛫 출국(출발지→공항)</button>
      <button class="tab" id="tab-in" onclick="switchTab('입국')" style="font-size:9.5px;padding:8px 2px">🛬 입국(공항→목적지)</button>
      <button class="tab" id="tab-long" onclick="switchTab('장거리')" style="font-size:9.5px;padding:8px 2px">🚗 전국장거리</button>
    </div>

    <div class="field" id="field-addr" style="order:2">
      <label class="lbl" id="lbl-addr">출발지 주소</label>
      <input class="inp" id="inp-addr" placeholder="예: 테헤란로 64길 8" autocomplete="off"
        oninput="onAddrInput()" onblur="hideAc()">
      <div class="ac" id="ac-list"></div>
    </div>
    <div class="field" id="field-detail" style="order:3;margin-top:-4px">
      <input class="inp" id="inp-detail" placeholder="상세주소 (동/호수/건물명 등)" autocomplete="off">
    </div>

    <div class="field" id="field-airport" style="order:4">
      <label class="lbl" id="lbl-ap">도착 공항</label>
      <select class="sel" id="sel-airport" onchange="onAirportChange()">
        <option value="T1">인천공항 T1</option>
        <option value="T2">인천공항 T2</option>
        <option value="GMP">김포공항</option>
      </select>
    </div>

    <div class="field" id="field-long" style="display:none;order:99">
      <label class="lbl">도착지 주소</label>
      <input class="inp" id="inp-long" placeholder="예: 해운대역, 아산병원, 강원랜드 등" autocomplete="off"
        oninput="onLongInput()" onblur="hideAcLong()">
      <div class="ac" id="ac-list-long"></div>
    </div>

    <div class="row2" style="order:4">
      <div class="field w2">
        <label class="lbl">탑승 일시</label>
        <input class="inp" type="datetime-local" id="inp-date" style="font-size:12px" onchange="clearResult()">
      </div>
      <div class="field">
        <label class="lbl">인원</label>
        <div class="stepper">
          <button class="stepper-btn" onclick="stepPax(-1)">−</button>
          <span class="stepper-val" id="inp-pax">1</span>
          <button class="stepper-btn" onclick="stepPax(1)">+</button>
        </div>
      </div>
    </div>

    <!-- 항공편명 (입국만) -->
    <div class="field" id="field-flight" style="display:none;order:5">
      <label class="lbl">✈️ 항공편명 <span style="color:#f5b800">(필수)</span></label>
      <input class="inp" id="inp-flight" placeholder="예: KE123, OZ456" autocomplete="off">
    </div>

    <!-- 짐 정보 -->
    <div class="row3" style="display:flex;gap:7px;margin-bottom:9px;margin-top:0;order:6">
      <div class="field" style="flex:1;margin-bottom:0">
        <label class="lbl" style="font-size:9px;letter-spacing:0">화물용 캐리어(대)</label>
        <div class="stepper">
          <button class="stepper-btn" onclick="stepVal('inp-cargo',-1)">−</button>
          <span class="stepper-val" id="inp-cargo">0</span>
          <button class="stepper-btn" onclick="stepVal('inp-cargo',1)">+</button>
        </div>
      </div>
      <div class="field" style="flex:1;margin-bottom:0">
        <label class="lbl" style="font-size:9px;letter-spacing:0">기내용 캐리어(소)</label>
        <div class="stepper">
          <button class="stepper-btn" onclick="stepVal('inp-cabin',-1)">−</button>
          <span class="stepper-val" id="inp-cabin">0</span>
          <button class="stepper-btn" onclick="stepVal('inp-cabin',1)">+</button>
        </div>
      </div>
      <div class="field" style="flex:1;margin-bottom:0">
        <label class="lbl" style="font-size:9px;letter-spacing:0">골프백/기타</label>
        <div class="stepper">
          <button class="stepper-btn" onclick="stepVal('inp-golf',-1)">−</button>
          <span class="stepper-val" id="inp-golf">0</span>
          <button class="stepper-btn" onclick="stepVal('inp-golf',1)">+</button>
        </div>
      </div>
    </div>

    <div class="field" style="order:7">
      <label class="lbl">차량 종류</label>
      <select class="sel" id="sel-veh" onchange="clearResult()">
        <option value="medium">중형택시 (4인승)</option>
        <option value="large">대형택시 (6인승)</option>
        <option value="van">콜밴 (9인승)</option>
      </select>
    </div>

    <div class="err-msg" id="err-msg" style="order:8"></div>
    <button class="calc-btn" onclick="calculate()" id="btn-calc" style="order:9">🔍 예상 요금 계산하기</button>

    <div id="result-wrap" style="order:10"></div>
    <div id="map-container" style="order:11"></div>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
// ── 확정요금 지역 ────────────────────────────────────────
const FIXED_FARE = {
  '인천': {normal: 50000, surcharge: 60000},
  '부천': {normal: 50000, surcharge: 60000},
  '고양': {normal: 55000, surcharge: 65000},
  '김포': {normal: 55000, surcharge: 65000},
  '광명': {normal: 55000, surcharge: 65000},
};

// 확정요금 지역 여부 + 해당 요금 반환
function getFixedFare(addrDisplay, hhmm, tab){
  const region = Object.keys(FIXED_FARE).find(r => addrDisplay.includes(r));
  if(!region) return null;
  const fare = FIXED_FARE[region];
  let isSurcharge;
  if(tab === '입국'){
    // 입국: 비행기 도착시간 21:00~03:00 → 할증 (수화물 후 탑승 감안)
    isSurcharge = hhmm >= 2100 || hhmm < 300;
  } else {
    // 출국/장거리: 탑승시간 22:00~04:00 → 할증
    isSurcharge = hhmm >= 2200 || hhmm < 400;
  }
  return { region, amount: isSurcharge ? fare.surcharge : fare.normal, isSurcharge };
}

// ════════════════════════════════════════════════════════
// ██  개발자 설정 영역  ██
// ════════════════════════════════════════════════════════
// API 엔드포인트: /api/route (Vercel 서버리스)
//   - type=address  : 카카오 주소검색
//   - type=region   : 카카오 좌표→행정구역 (시계외할증 판단)
//   - type=route    : T-map 경로/통행료
//
// 카카오 채널 링크: https://pf.kakao.com/_gVxaAX/chat
//
// [연동 필요 항목]
//   1. 예약 완료 → DB 저장 (예약 정보)
//   2. 카카오 알림톡 자동 발송 (손님/관리자)
//   3. 전화번호 인증 (솔라피/알리고 등)
// ════════════════════════════════════════════════════════

// ── 상수 ─────────────────────────────────────────────────
const AIRPORTS = {
  T1:{name:'인천공항 T1', lat:37.44936, lng:126.45100},
  T2:{name:'인천공항 T2', lat:37.47281, lng:126.44861},
  GMP:{name:'김포공항', lat:37.55830, lng:126.79060},
};
const METER = {
  medium:{base:4800, perKm:757.58},
  large: {base:6500, perKm:787.40},
  van:   {base:8000, perKm:900.00},
};
const VNAMES = {medium:'중형택시', large:'대형택시', van:'콜밴'};

// ── 공동사업구역 (카카오 API로 정확하게 판단) ───────────
const SHARED_NAMES = ['서울특별시','인천광역시','고양시','부천시','김포시','광명시'];

async function isInSharedZoneAPI(lat, lng){
  try {
    const res = await fetch(`/api/route?type=region&x=${lng}&y=${lat}`);
    const data = await res.json();
    if(!data.documents || !data.documents.length) return false;
    const doc = data.documents[0];
    return SHARED_NAMES.some(name =>
      doc.region_1depth_name.includes(name) ||
      doc.region_2depth_name.includes(name)
    );
  } catch(e){ return false; }
}

// ── 두 좌표간 거리 (km, Haversine) ──────────────────────
function haversine(lat1, lng1, lat2, lng2){
  const R=6371, dLat=(lat2-lat1)*Math.PI/180, dLng=(lng2-lng1)*Math.PI/180;
  const a=Math.sin(dLat/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

// ── 이진탐색으로 공동사업구역 이탈 지점 찾기 ─────────────
// API 호출 최소화: log2(n) ≈ 8회
async function findExitPointAPI(coords){
  // 목적지가 공동사업구역 안이면 할증 없음
  const last = coords[coords.length-1];
  const destIn = await isInSharedZoneAPI(last[0], last[1]);
  if(destIn) return { exitIdx: -1, normalKm: 0 };

  // 이진탐색으로 경계 찾기
  let lo = 0, hi = coords.length - 1;
  while(hi - lo > 3){
    const mid = Math.floor((lo + hi) / 2);
    const inZone = await isInSharedZoneAPI(coords[mid][0], coords[mid][1]);
    if(inZone) lo = mid;
    else hi = mid;
  }

  // lo~hi 구간 세밀하게 확인
  let exitIdx = hi;
  for(let i = lo; i <= hi; i++){
    const inZone = await isInSharedZoneAPI(coords[i][0], coords[i][1]);
    if(!inZone){ exitIdx = i; break; }
  }

  // 이탈 지점까지 거리 계산
  let normalKm = 0;
  for(let i = 0; i < exitIdx - 1; i++){
    normalKm += haversine(coords[i][0],coords[i][1],coords[i+1][0],coords[i+1][1]);
  }
  return { exitIdx, normalKm };
}

// ── 시간대별 기본요금 (분 단위 정확하게) ────────────────
function getHHMM(dateV){
  const d = dateV ? new Date(dateV) : new Date();
  return d.getHours() * 100 + d.getMinutes();
}

function getBaseFare(hhmm){
  if(hhmm >= 2300 || hhmm < 200) return 6800;  // 23:00~01:59 40%
  if(hhmm >= 2200 || hhmm < 400) return 5700;  // 22:00~22:59, 02:00~03:59 20%
  return 4800;                                   // 평시
}

function getNightMult(hhmm){
  if(hhmm >= 2300 || hhmm < 200) return 1.4;
  if(hhmm >= 2200 || hhmm < 400) return 1.2;
  return 1.0;
}

// ── 시간대별 할증 배수 (분 단위) ─────────────────────────
function getMultiplierAt(minutesFromMidnight){
  const m = ((minutesFromMidnight % 1440) + 1440) % 1440;
  if(m >= 1380 || m < 120) return 1.4;  // 23:00~02:00
  if((m >= 1320 && m < 1380) || (m >= 120 && m < 240)) return 1.2;  // 22:00~23:00, 02:00~04:00
  return 1.0;
}

// ── 야간 예상 소요시간 (분) ───────────────────────────────
function getEstimatedMinutes(distKm){
  if(distKm < 50)  return 40;
  if(distKm < 70)  return 50;
  if(distKm < 90)  return 60;
  if(distKm < 110) return 70;
  return 80;
}

// ── 구간별 거리요금 계산 (시간대 경계 쪼개기) ─────────────
// startMin: 구간 시작(자정 기준 분), endMin: 구간 끝
// segKm: 구간 거리, perKm: km당 요금, cityMult: 시계외 배수
function calcSegmentFare(startMin, endMin, segKm, perKm, cityMult){
  if(segKm <= 0 || endMin <= startMin) return 0;
  const segTotalMin = endMin - startMin;
  // 경계점 (자정 기준 분): 22:00=1320, 23:00=1380, 02:00=120(+1440=1560), 04:00=240(+1440=1680)
  const boundaries = [120, 240, 1320, 1380, 1560, 1680, 2760, 2820].filter(b => b > startMin && b < endMin);
  const pts = [startMin, ...boundaries, endMin];
  let fare = 0;
  for(let i = 0; i < pts.length - 1; i++){
    const ratio = (pts[i+1] - pts[i]) / segTotalMin;
    const km    = segKm * ratio;
    const mult  = getMultiplierAt(pts[i] + 0.5);
    fare += km * perKm * mult * cityMult;
  }
  return Math.round(fare / 100) * 100;
}


// ── 메인 계산 ─────────────────────────────────────────────
async function calculate(){
  const btn = document.getElementById('btn-calc');
  const errEl = document.getElementById('err-msg');
  errEl.classList.remove('show');
  clearResult();

  // 주소 없을 때 자동 검색
  if(!selectedAddr){
    const q = document.getElementById('inp-addr').value.trim();
    if(!q){
      document.getElementById('inp-addr').classList.add('shake');
      setTimeout(()=>document.getElementById('inp-addr').classList.remove('shake'),500);
      return;
    }
    // 카카오 지오코딩
    btn.disabled=true; btn.textContent='🔍 주소 검색 중...';
    const geoRes = await fetch(`/api/route?type=address&query=${encodeURIComponent(q)}`);
    const geoData = await geoRes.json();
    const found = geoData.documents && geoData.documents.length
      ? {display: geoData.documents[0].address_name || geoData.documents[0].road_address_name || q,
         lat: parseFloat(geoData.documents[0].y),
         lng: parseFloat(geoData.documents[0].x)}
      : null;
    if(!found){
      errEl.textContent = '주소를 찾을 수 없어요. 더 자세히 입력해 주세요.';
      errEl.classList.add('show');
      btn.disabled=false; btn.textContent='🔍 예상 요금 계산하기';
      return;
    }
    selectedAddr = found;
  }

  // 입국 탭: 항공편명 필수
  if(currentTab === '입국'){
    const flight = document.getElementById('inp-flight').value.trim();
    if(!flight){
      const el = document.getElementById('inp-flight');
      el.classList.add('shake');
      el.style.borderColor='rgba(255,80,80,0.6)';
      setTimeout(()=>{el.classList.remove('shake');el.style.borderColor='';},600);
      btn.disabled=false; btn.textContent='🔍 예상 요금 계산하기';
      return;
    }
  }

  btn.disabled=true; btn.textContent='📡 경로 계산 중...';

  const apId  = document.getElementById('sel-airport').value;

  // 전국장거리 처리
  if(currentTab === '장거리' || apId === 'LONG'){
    if(!selectedLong){
      const q = document.getElementById('inp-long').value.trim();
      if(!q){
        document.getElementById('inp-long').classList.add('shake');
        setTimeout(()=>document.getElementById('inp-long').classList.remove('shake'),500);
        btn.disabled=false; btn.textContent='🔍 예상 요금 계산하기';
        return;
      }
      btn.disabled=true; btn.textContent='🔍 주소 검색 중...';
      const geoRes = await fetch(`/api/route?type=address&query=${encodeURIComponent(q)}`);
      const geoData = await geoRes.json();
      if(!geoData.documents||!geoData.documents.length){
        errEl.textContent='목적지 주소를 찾을 수 없어요.'; errEl.classList.add('show');
        btn.disabled=false; btn.textContent='🔍 예상 요금 계산하기'; return;
      }
      selectedLong = {display:geoData.documents[0].address_name||q, lat:parseFloat(geoData.documents[0].y), lng:parseFloat(geoData.documents[0].x)};
    }
  }

  const ap = (currentTab==='장거리' || apId==='LONG')
    ? {name:selectedLong.display, lat:selectedLong.lat, lng:selectedLong.lng}
    : AIRPORTS[apId];
  const veh   = document.getElementById('sel-veh').value;
  const dateV = document.getElementById('inp-date').value;
  const hhmm      = getHHMM(dateV);
  const nightMult = getNightMult(hhmm);
  const baseFare  = getBaseFare(hhmm);

  // 출국/장거리: selectedAddr → ap(목적지)
  // 입국: ap(공항) → selectedAddr
  const isDepFirst = currentTab==='출국' || currentTab==='장거리';
  const dep = isDepFirst ? {lat:selectedAddr.lat, lng:selectedAddr.lng} : {lat:ap.lat, lng:ap.lng};
  const arr = isDepFirst ? {lat:ap.lat, lng:ap.lng} : {lat:selectedAddr.lat, lng:selectedAddr.lng};
  const depName = isDepFirst ? selectedAddr.display : ap.name;
  const arrName = isDepFirst ? ap.name : selectedAddr.display;

  // ── 확정요금 지역 체크 ───────────────────────────────────
  const checkAddr = currentTab === '입국' ? selectedAddr.display : selectedAddr.display;
  const fixedFare = getFixedFare(checkAddr, hhmm, currentTab);
  if(fixedFare){
    btn.disabled=false; btn.textContent='🔍 예상 요금 계산하기';
    showFixedFare(fixedFare, depName, arrName);
    // 지도는 T-map 없이 직선으로 표시
    showMap([], dep, arr, depName, arrName, 0, -1);
    return;
  }

  try {
    // T-map 경로 API (실제 통행료 + 택시요금)
    const tmapRes = await fetch(
      `/api/route?type=route&startX=${dep.lng}&startY=${dep.lat}&endX=${arr.lng}&endY=${arr.lat}`
    );
    const tmapData = await tmapRes.json();
    if(!tmapData.features||!tmapData.features.length) throw new Error('경로 없음');

    const summary = tmapData.features[0].properties;
    const distKm  = summary.totalDistance / 1000;
    const durMin  = Math.round(summary.totalTime / 60);
    const toll    = summary.totalFare || 0;

    // 경로 좌표 (지도용 + 시계외할증 계산용)
    const coords = tmapData.features
      .filter(f => f.geometry && f.geometry.type === 'LineString')
      .flatMap(f => f.geometry.coordinates.map(c => [c[1], c[0]]));

    const m = METER[veh];
    let totalFare, distFare, surchargeKm = 0, normalKm = distKm;
    let exitIdx = -1;

    // ── 입국/장거리 탭: 시계외할증 계산 ──────────────────
    if(currentTab === '입국' || currentTab === '장거리'){
      const destInZone = await isInSharedZoneAPI(arr.lat, arr.lng);
      if(!destInZone && coords.length > 0){
        btn.textContent='📍 구간 분석 중...';
        const exit = await findExitPointAPI(coords);
        exitIdx = exit.exitIdx;
        if(exitIdx >= 0){
          normalKm    = exit.normalKm;
          surchargeKm = Math.max(0, distKm - normalKm);
        }
      }
    }

    // 미터기 계산
    {
      const depMin    = Math.floor(hhmm/100)*60 + (hhmm%100);
      // 장거리: T-map 실제 소요시간 / 입출국: 야간 기준 예상시간
      const travelMin = currentTab === '장거리' ? durMin : getEstimatedMinutes(distKm);
      const borderMin = (surchargeKm > 0)
        ? depMin + travelMin * (normalKm / distKm)
        : depMin + travelMin;

      const normalFare    = calcSegmentFare(depMin, borderMin, normalKm, m.perKm, 1.0);
      const surchargeFare = calcSegmentFare(borderMin, depMin + travelMin, surchargeKm, m.perKm, 1.2);
      distFare = normalFare + surchargeFare;

      const baseFareNight = Math.round(m.base * nightMult / 100) * 100;
      totalFare = baseFareNight + distFare + toll;
    }

    showResult({depName, arrName, distKm, baseFare: m.base, distFare, toll, totalFare, nightMult, veh, surchargeKm});
    showMap(coords, dep, arr, depName, arrName, distKm, exitIdx);

  } catch(e){
    console.error('경로 오류:', e);
    errEl.textContent = '경로 오류: ' + e.message;
    errEl.classList.add('show');
  }

  btn.disabled=false; btn.textContent='🔍 예상 요금 계산하기';
}

        <button class="kbtn main" onclick="openExtra()">📋 예약하기 →</button>
      </div>
    </div></div>`;
}

function buildCallCard(extra){
  extra = extra || {};
  const dateV = document.getElementById('inp-date').value;
  const d = dateV ? new Date(dateV) : new Date();
  const month = d.getMonth()+1, day = d.getDate();
  const hours = d.getHours(), minutes = d.getMinutes();
  const ampm = hours < 12 ? '오전' : '오후';
  const h12 = hours % 12 || 12;
  const timeStr = `${ampm} ${h12}시${minutes > 0 ? ` ${minutes}분` : ''}`;
  const dateStr = `${month}월 ${day}일`;

  const pax   = document.getElementById('inp-pax').textContent   || '1';
  const cabin = document.getElementById('inp-cabin').textContent || '0';
  const cargo = document.getElementById('inp-cargo').textContent || '0';
  const golf  = document.getElementById('inp-golf').textContent  || '0';

  if(currentTab === '출국'){
    const detail = document.getElementById('inp-detail').value.trim();
    const from = (document.getElementById('inp-addr').value || '') + (detail ? ' ' + detail : '');
    const apId = document.getElementById('sel-airport').value;
    const apName = AIRPORTS[apId] ? AIRPORTS[apId].name : apId;
    return `🚖출국택시 예약

1️⃣출발일자 : ${dateStr}
2️⃣택시탑승시간(오전/오후) : ${timeStr}
3️⃣출발지주소 : ${from}
4️⃣목적지(인천공항 t1,t2): ${apName}
5️⃣탑승인원 : ${pax}
6️⃣기내용 케리어(개수) : ${cabin}
7️⃣화물용 케리어(개수) : ${cargo}
8️⃣골프백 기타(개수) : ${golf}
9️⃣연락처 : ${extra.phone||''}
🔟이름 : ${extra.name||''}
💗추가사항(※필요시기재)
🔹카시트대여 (콜밴,대형 1만원) : ${extra.carseat||''}
🔹외국인 피켓 픽업 서비스요청 : ${extra.picket||''}
🔹카카오톡 ID : ${extra.kakaoId||''}
🔹요청사항 : ${extra.request||''}
🔹경유지: ${extra.waypoint||''}`;

  } else if(currentTab === '입국'){
    const detail = document.getElementById('inp-detail').value.trim();
    const to = (document.getElementById('inp-addr').value || '') + (detail ? ' ' + detail : '');
    const apId = document.getElementById('sel-airport').value;
    const apName = AIRPORTS[apId] ? AIRPORTS[apId].name : apId;
    const flight = document.getElementById('inp-flight').value || '';
    return `🚕입국택시 예약

1️⃣입국일자 : ${dateStr}
2️⃣비행기 도착시간(오전/오후) : ${timeStr}
3️⃣도착공항 (인천공항 t1,t2) : ${apName}
🌟비행기 편명 : ${flight}
4️⃣목적지 주소 : ${to}
5️⃣탑승인원 : ${pax}
6️⃣기내용 케리어(개수) : ${cabin}
7️⃣화물용 케리어(개수) : ${cargo}
8️⃣골프백,기타(개수) : ${golf}
9️⃣연락처 : ${extra.phone||''}
🔟이름 : ${extra.name||''}
💗추가사항(※필요시기재)
🔹카시트대여 (콜밴,대형 1만원) : ${extra.carseat||''}
🔹외국인 피켓 픽업 서비스요청 : ${extra.picket||''}
🔹카카오톡 ID : ${extra.kakaoId||''}
🔹요청사항 : ${extra.request||''}
🔹경유지: ${extra.waypoint||''}`;

  } else { // 장거리
    const detail = document.getElementById('inp-detail').value.trim();
    const from = (document.getElementById('inp-addr').value || '') + (detail ? ' ' + detail : '');
    const to   = document.getElementById('inp-long').value || '';
    return `🚗전국장거리 예약

1️⃣출발일자 : ${dateStr}
2️⃣택시탑승시간(오전/오후) : ${timeStr}
3️⃣출발지주소 : ${from}
4️⃣목적지 주소 : ${to}
5️⃣탑승인원 : ${pax}
6️⃣기내용 케리어(개수) : ${cabin}
7️⃣화물용 케리어(개수) : ${cargo}
8️⃣골프백 기타(개수) : ${golf}
9️⃣연락처 :
🔟이름 :
💗추가사항(※필요시기재)
🔹카시트대여 (콜밴,대형 1만원) :
🔹요청사항 :
🔹경유지:`;
  }
}

function openExtra(){
  const bg = document.createElement('div');
  bg.className = 'modal-bg';
  bg.innerHTML = `
    <div class="modal">
      <button class="modal-close" onclick="document.body.removeChild(this.closest('.modal-bg'))">✕</button>
      <div class="modal-title" style="font-size:15px">📋 예약 추가 정보</div>

      <div class="extra-section">
        <label class="extra-label req">연락처</label>
        <input class="extra-inp req" id="ex-phone" type="tel" placeholder="010-0000-0000">
      </div>
      <div class="extra-section">
        <label class="extra-label req">이름</label>
        <input class="extra-inp req" id="ex-name" placeholder="홍길동">
      </div>

      <hr class="extra-divider">
      <div class="extra-opt-title">✦ 추가사항 (선택)</div>

      <div class="extra-row">
        <div class="extra-section">
          <label class="extra-label">카시트 대여</label>
          <input class="extra-inp" id="ex-carseat" placeholder="대형·콜밴시 1만원">
        </div>
        <div class="extra-section">
          <label class="extra-label">외국인 피켓 픽업</label>
          <input class="extra-inp" id="ex-picket" placeholder="2만원">
        </div>
      </div>
      <div class="extra-section">
        <label class="extra-label">카카오톡 ID</label>
        <input class="extra-inp" id="ex-kakao" placeholder="카카오톡 ID">
      </div>
      <div class="extra-section">
        <label class="extra-label">요청사항</label>
        <input class="extra-inp" id="ex-request" placeholder="기타 요청사항">
      </div>
      <div class="extra-section">
        <label class="extra-label">경유지</label>
        <input class="extra-inp" id="ex-waypoint" placeholder="경유지 주소">
      </div>

      <div class="modal-btns" style="margin-top:16px">
        <button class="modal-btn kakao" onclick="confirmExtra()">확인 → 콜카드 보기</button>
      </div>
    </div>`;
  document.body.appendChild(bg);
}

function confirmExtra(){
  const phone = document.getElementById('ex-phone').value.trim();
  const name  = document.getElementById('ex-name').value.trim();
  if(!phone){
    const el = document.getElementById('ex-phone');
    el.style.borderColor='rgba(255,80,80,0.6)';
    el.focus();
    setTimeout(()=>el.style.borderColor='',1500);
    return;
  }
  // 추가정보 수집
  const extra = {
    phone, name,
    carseat  : document.getElementById('ex-carseat').value.trim(),
    picket   : document.getElementById('ex-picket').value.trim(),
    kakaoId  : document.getElementById('ex-kakao').value.trim(),
    request  : document.getElementById('ex-request').value.trim(),
    waypoint : document.getElementById('ex-waypoint').value.trim(),
  };
  // 추가정보 모달 닫기
  const bg = document.querySelector('.modal-bg');
  if(bg) document.body.removeChild(bg);
  // 콜카드 모달 열기
  openKakao(extra);
}

function openKakao(extra){
  const card = buildCallCard(extra);
  // 모달로 카드 표시
  const bg = document.createElement('div');
  bg.className = 'modal-bg';
  const cardId = 'card-' + Date.now();
  bg.innerHTML = `
    <div class="modal">
      <button class="modal-close" onclick="document.body.removeChild(this.closest('.modal-bg'))">✕</button>
      <div class="modal-title">📋 콜카드 확인 후 복사 → 카톡에 붙여넣기</div>
      <div class="modal-card" id="${cardId}">${card}</div>
      <div class="modal-btns">
        <button class="modal-btn copy" id="copybtn" onclick="doCopy('${cardId}')">📋 복사하고 카톡 연결</button>
      </div>
      <div class="modal-guide" id="modal-guide">
        <div class="modal-guide-icon">📋</div>
        <div class="modal-guide-sub">카톡이 연결되면<br>채팅창을 꾹 눌러<br>붙여넣기 해주세요!<br>빠른 상담이 가능합니다^^</div>
        <div class="modal-guide-title">복사 완료</div>
      </div>
      <div class="modal-btns" id="kakao-btn-wrap" style="display:none;margin-top:8px">
        <button class="modal-btn kakao" onclick="gotoKakao()">💬 카톡 열기 →</button>
      </div>
    </div>`;
  document.body.appendChild(bg);

}

function doCopy(id){
  const text = document.getElementById(id).innerText;
  const btn = document.getElementById('copybtn');
  const copy = ()=>{
    // 콜카드 숨기고 안내멘트 표시
    document.getElementById(id).style.display='none';
    btn.style.display='none';
    document.getElementById('modal-guide').classList.add('show');
    document.getElementById('kakao-btn-wrap').style.display='flex';
  };
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(text).then(copy).catch(()=>fallbackCopy(text, copy));
  } else { fallbackCopy(text, copy); }
}
function fallbackCopy(text, cb){
  const ta = document.createElement('textarea');
  ta.value = text;
  ta.style.cssText = 'position:fixed;top:-9999px;left:-9999px';
  document.body.appendChild(ta);
  ta.focus(); ta.select();
  try{ document.execCommand('copy'); cb(); } catch(e){}
  document.body.removeChild(ta);
}
function gotoKakao(){
  window.open('https://pf.kakao.com/_gVxaAX/chat','_blank');
}

// ── 지도 ──────────────────────────────────────────────────
function showMap(coords, dep, arr, depName, arrName, distKm, exitIdx){
  if(leafMap){ leafMap.remove(); leafMap=null; }
  document.getElementById('map-container').innerHTML = `
    <div class="map-wrap">
      <div class="map-hdr">
        <span>🗺️</span>
        <span class="map-hdr-txt">${depName.split(' ').slice(0,2).join(' ')} → ${arrName}</span>
        <span class="map-hdr-dist">${distKm.toFixed(1)}km</span>
      </div>
      <div id="map-load" class="map-load"><div class="spinner"></div><span>지도 불러오는 중...</span></div>
      <div id="map" style="display:none"></div>
    </div>`;
  setTimeout(()=>{
    document.getElementById('map-load').style.display='none';
    document.getElementById('map').style.display='block';
    leafMap = L.map('map',{zoomControl:true,attributionControl:false});
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:18}).addTo(leafMap);

    let mainLine;
    if(exitIdx > 0 && exitIdx < coords.length){
      // 공동사업구역 내 구간: 초록
      const normalCoords    = coords.slice(0, exitIdx + 1);
      // 시계외할증 구간: 빨강
      const surchargeCoords = coords.slice(exitIdx);
      const line1 = L.polyline(normalCoords,   {color:'#22c55e', weight:5, opacity:.9}).addTo(leafMap);
      const line2 = L.polyline(surchargeCoords,{color:'#ef4444', weight:5, opacity:.9}).addTo(leafMap);
      // 빨간 구간 범례
      const mid = surchargeCoords[Math.floor(surchargeCoords.length/2)];
      if(mid) L.marker(mid,{icon:L.divIcon({
        html:`<div style="background:#ef4444;color:white;border-radius:4px;padding:2px 5px;font-size:10px;font-weight:700;white-space:nowrap;box-shadow:0 2px 6px rgba(0,0,0,0.4)">시계외할증</div>`,
        iconAnchor:[30,10],className:''
      })}).addTo(leafMap);
      mainLine = L.featureGroup([line1, line2]);
    } else {
      mainLine = L.polyline(coords,{color:'#22c55e',weight:5,opacity:.9}).addTo(leafMap);
    }

    addMarker(dep.lat,dep.lng,'출','#3b82f6',depName);
    addMarker(arr.lat,arr.lng,'착','#ef4444',arrName);
    leafMap.fitBounds(mainLine.getBounds(),{padding:[18,18]});
  },100);
}

function addMarker(lat,lng,label,color,name){
  const icon = L.divIcon({
    html:`<div style="background:${color};color:white;border-radius:50%;width:30px;height:30px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;border:2px solid white;box-shadow:0 2px 8px rgba(0,0,0,0.4)">${label}</div>`,
    iconSize:[30,30],iconAnchor:[15,15],className:''
  });
  L.marker([lat,lng],{icon}).bindPopup(`<b>${label==='출'?'출발':'도착'}</b><br>${name}`,{closeButton:false}).addTo(leafMap);
}
